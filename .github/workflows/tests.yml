name: Tests

on:
  workflow_call:

jobs:
  backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend test image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.test
          push: false
          load: true
          tags: mep-backend-test:ci
          cache-from: type=gha,scope=backend-test
          cache-to: type=gha,mode=max,scope=backend-test

      - name: Run backend test suite
        run: docker run --rm mep-backend-test:ci pytest --cov=app --cov-report=term-missing --cov-fail-under=80

  frontend:
    name: Frontend tests (jest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend test image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.dev
          push: false
          load: true
          tags: mep-frontend-test:ci
          cache-from: type=gha,scope=frontend-test
          cache-to: type=gha,mode=max,scope=frontend-test

      - name: Run frontend test suite
        run: docker run --rm mep-frontend-test:ci npm run test:coverage
